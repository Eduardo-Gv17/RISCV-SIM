<!DOCTYPE html>
<html lang="es">
<head>

<title>RISC-V RV32I Simulator — CS3051</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#1e1e1e;--bg1:#252526;--bg2:#2d2d30;--bg3:#3c3c3c;
  --border:#3c3c3c;--border2:#505050;
  --text:#d4d4d4;--text2:#9d9d9d;--text3:#6a6a6a;
  --accent:#569cd6;--accent2:#4ec9b0;--accent3:#ce9178;
  --yellow:#dcdcaa;--green:#6a9955;--red:#f44747;
  --sel:#264f78;--cur:#0e639c;
}
body{font-family:'Consolas','Courier New',monospace;font-size:13px;background:var(--bg0);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TITLE */
#titlebar{background:var(--bg1);padding:0;border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;height:35px}
.tb-tab{padding:0 20px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);border-right:1px solid var(--border);cursor:default}
.tb-tab.active{background:var(--bg0);color:var(--text);border-bottom:1px solid var(--cur)}
.tb-tab .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
#tb-right{margin-left:auto;display:flex;align-items:center;padding:0 16px;gap:16px;font-size:11px;color:var(--text3)}

/* TOOLBAR */
#toolbar{background:var(--bg2);padding:5px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn{padding:4px 12px;font-size:12px;font-family:'Consolas','Courier New',monospace;border:1px solid var(--border2);border-radius:2px;background:var(--bg3);color:var(--text);cursor:pointer;transition:all 0.1s;white-space:nowrap}
.btn:hover{background:#4a4a4a;border-color:#6a6a6a}
.btn:active{background:var(--sel)}
.btn.run{background:var(--cur);border-color:#1177bb;color:#fff}
.btn.run:hover{background:#1177bb}
.sep{width:1px;height:18px;background:var(--border2);margin:0 4px;flex-shrink:0}
#statusbar-top{margin-left:auto;font-size:11px;color:var(--text3);display:flex;gap:16px;align-items:center}
#status-txt{color:var(--accent)}

/* LAYOUT */
#main{display:grid;grid-template-columns:200px 1fr 260px;flex:1;overflow:hidden;min-height:0}

/* REGISTERS */
#panel-regs{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg1)}
.panel-hdr{font-size:11px;color:var(--text3);padding:6px 10px 5px;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1);z-index:1}
.reg-row{display:grid;grid-template-columns:28px 34px 1fr;gap:0;padding:1px 10px;line-height:1.75;cursor:default;border-left:2px solid transparent}
.reg-row:hover{background:var(--bg2)}
.reg-row.changed{border-left-color:var(--accent2);background:#1a2a28}
.rn{color:var(--text3);font-size:11px}
.ra{color:var(--text2);font-size:11px}
.rv{color:var(--text)}
.rv.nz{color:var(--yellow)}
.rv.pc-val{color:var(--accent)}

/* CENTER */
#panel-center{display:grid;grid-template-rows:1fr 185px;overflow:hidden;min-height:0}

/* DISASM */
#disasm-panel{overflow-y:auto;background:var(--bg0);min-height:0}
.panel-hdr-dis{font-size:11px;color:var(--text3);padding:6px 12px 5px;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg0);z-index:1;display:flex;justify-content:space-between}
.di-row{display:grid;grid-template-columns:16px 96px 86px 1fr;gap:8px;padding:1px 12px;line-height:1.75;font-size:12px;border-left:2px solid transparent}
.di-row:hover{background:var(--bg1)}
.di-row.cur{background:var(--sel);border-left-color:var(--accent)}
.di-mark{color:var(--accent);font-weight:bold}
.di-addr{color:var(--text3)}
.di-hex{color:var(--text3);font-size:11px}
.di-mn{color:var(--text)}
.di-row.cur .di-mn{color:var(--yellow)}
/* keyword colors in disasm */
.kw-load{color:var(--accent2)}
.kw-store{color:var(--accent3)}
.kw-branch{color:#c586c0}
.kw-jump{color:#569cd6}
.kw-arith{color:var(--text)}
.kw-reg{color:var(--accent2)}

/* MEMORY */
#mem-panel{border-top:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg1);min-height:0}
#mem-toolbar{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#mem-toolbar label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
#mem-addr{width:110px;font-family:'Consolas','Courier New',monospace;font-size:12px;padding:2px 7px;background:var(--bg0);border:1px solid var(--border2);color:var(--yellow);border-radius:2px;outline:none}
#mem-addr:focus{border-color:var(--accent)}
#mem-content{overflow-y:auto;padding:3px 12px;flex:1;font-size:12px}
.mem-row{display:flex;gap:10px;padding:1px 0;line-height:1.7}
.ma{color:var(--text3);min-width:86px}
.mb{color:var(--text);letter-spacing:1px}
.mb .hi{color:var(--accent);font-weight:bold}
.mb .nz{color:var(--yellow)}
.mc{color:var(--text3)}

/* CONSOLE */
#panel-console{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg0)}
#console-out{flex:1;overflow-y:auto;padding:6px 10px;font-size:12px;line-height:1.6;min-height:0}
.co-line{padding:0;word-break:break-all;white-space:pre-wrap}
.co-cmd{color:var(--accent)}
.co-ok{color:var(--accent2)}
.co-err{color:var(--red)}
.co-info{color:var(--yellow)}
.co-dim{color:var(--text3)}
.co-out{color:var(--text)}
#console-in-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg1)}
#cin-prompt{color:var(--accent);font-weight:bold;flex-shrink:0}
#console-input{flex:1;font-family:'Consolas','Courier New',monospace;font-size:12px;padding:3px 6px;background:var(--bg0);border:1px solid var(--border);color:var(--text);border-radius:2px;outline:none}
#console-input:focus{border-color:var(--accent)}

/* BOTTOM STATUS BAR */
#bottombar{background:#007acc;padding:2px 14px;font-size:11px;color:#fff;flex-shrink:0;display:flex;gap:20px;align-items:center}
#bottombar b{font-weight:600}
#bottombar .bb-right{margin-left:auto;color:rgba(255,255,255,0.7);font-size:10px}

/* FILE INPUT */
#file-input{display:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:#6a6a6a}
</style>

<script>
'use strict';
const RN=['zero','ra','sp','gp','tp','t0','t1','t2','s0','s1','a0','a1','a2','a3','a4','a5','a6','a7','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11','t3','t4','t5','t6'];
const MEM=1<<23;

class CPU{
  constructor(){this.mem=new Uint8Array(MEM);this.regs=new Int32Array(32);this.pc=0;this.halted=false;this.exitCode=0;this.count=0;this.out=[];this.regs[2]=MEM-4}
  reset(){this.mem.fill(0);this.regs.fill(0);this.regs[2]=MEM-4;this.pc=0;this.halted=false;this.exitCode=0;this.count=0;this.out=[]}
  load(b,a=0){for(let i=0;i<b.length&&a+i<MEM;i++)this.mem[a+i]=b[i]}
  r8(a){return(a>>>=0)<MEM?this.mem[a]:0}
  r16(a){return this.r8(a)|(this.r8(a+1)<<8)}
  r32(a){return(this.r8(a)|(this.r8(a+1)<<8)|(this.r8(a+2)<<16)|(this.r8(a+3)<<24))>>>0}
  w8(a,v){if((a>>>=0)<MEM)this.mem[a]=v&255}
  w16(a,v){this.w8(a,v);this.w8(a+1,(v>>8)&255)}
  w32(a,v){this.w8(a,v);this.w8(a+1,(v>>8)&255);this.w8(a+2,(v>>16)&255);this.w8(a+3,(v>>>24)&255)}
  sx(v,b){const s=32-b;return(v<<s)>>s}
  iI(i){return(i>>20)|((i&0x80000000)?0xFFFFF000:0)}
  iS(i){let v=((i>>25)&127)<<5|(i>>7&31);return(i&0x80000000)?v|0xFFFFF000:v}
  iB(i){let v=((i>>31)&1)<<12|((i>>7)&1)<<11|((i>>25)&63)<<5|((i>>8)&15)<<1;return(i&0x80000000)?v-8192:v}
  iU(i){return i&0xFFFFF000}
  iJ(i){let v=((i>>31)&1)<<20|((i>>12)&255)<<12|((i>>20)&1)<<11|((i>>21)&1023)<<1;return(i&0x80000000)?v-(1<<21):v}

  step(){
    if(this.halted)return;
    const pc=this.pc>>>0,I=this.r32(pc);
    const op=I&127,rd=(I>>7)&31,f3=(I>>12)&7,rs1=(I>>15)&31,rs2=(I>>20)&31,f7=(I>>25)&127;
    let npc=(pc+4)>>>0,rdv=0,wr=false;
    const R=r=>this.regs[r],U=r=>this.regs[r]>>>0;
    switch(op){
      case 0x37:rdv=this.iU(I)>>>0;wr=true;break;
      case 0x17:rdv=(pc+this.iU(I))>>>0;wr=true;break;
      case 0x6F:rdv=npc;npc=(pc+this.iJ(I))>>>0;wr=true;break;
      case 0x67:rdv=npc;npc=((R(rs1)+this.iI(I))&~1)>>>0;wr=true;break;
      case 0x63:{const im=this.iB(I),v1=R(rs1),v2=R(rs2),u1=U(rs1),u2=U(rs2);
        let tk=false;
        if(f3===0)tk=v1===v2;else if(f3===1)tk=v1!==v2;else if(f3===4)tk=v1<v2;
        else if(f3===5)tk=v1>=v2;else if(f3===6)tk=u1<u2;else if(f3===7)tk=u1>=u2;
        if(tk)npc=(pc+im)>>>0;break;}
      case 0x03:{const ad=(R(rs1)+this.iI(I))>>>0;
        if(f3===0)rdv=this.sx(this.r8(ad),8);else if(f3===1)rdv=this.sx(this.r16(ad),16);
        else if(f3===2)rdv=this.r32(ad);else if(f3===4)rdv=this.r8(ad);else if(f3===5)rdv=this.r16(ad);
        wr=true;break;}
      case 0x23:{const ad=(R(rs1)+this.iS(I))>>>0,v=R(rs2);
        if(f3===0)this.w8(ad,v);else if(f3===1)this.w16(ad,v);else if(f3===2)this.w32(ad,v);break;}
      case 0x13:{const im=this.iI(I),s=R(rs1),u=U(rs1);
        if(f3===0)rdv=s+im;else if(f3===2)rdv=s<im?1:0;else if(f3===3)rdv=u<(im>>>0)?1:0;
        else if(f3===4)rdv=s^im;else if(f3===6)rdv=s|im;else if(f3===7)rdv=s&im;
        else if(f3===1)rdv=u<<(im&31);
        else if(f3===5){const sh=im&31;rdv=f7===0x20?s>>sh:u>>sh;}
        wr=true;break;}
      case 0x33:{const v1=R(rs1),v2=R(rs2),u1=U(rs1),u2=U(rs2);
        if(f3===0)rdv=f7===0x20?v1-v2:v1+v2;else if(f3===1)rdv=u1<<(u2&31);
        else if(f3===2)rdv=v1<v2?1:0;else if(f3===3)rdv=u1<u2?1:0;
        else if(f3===4)rdv=v1^v2;
        else if(f3===5){const sh=u2&31;rdv=f7===0x20?v1>>sh:u1>>sh;}
        else if(f3===6)rdv=v1|v2;else if(f3===7)rdv=v1&v2;
        wr=true;break;}
      case 0x73:{const sn=this.regs[17]>>>0;
        if(sn===10||sn===17){this.halted=true;this.exitCode=this.regs[10];}
        else if(sn===1)this.out.push(''+this.regs[10]);
        else if(sn===11)this.out.push(String.fromCharCode(this.regs[10]&255));
        else if(sn===4){let s='',a=this.regs[10]>>>0;for(let i=0;i<512;i++){const c=this.r8(a+i);if(!c)break;s+=String.fromCharCode(c);}this.out.push(s);}
        else this.out.push('[ecall '+sn+' no impl]');
        break;}
      default:
        this.out.push('[ERROR] opcode 0x'+op.toString(16)+' desconocido @ 0x'+pc.toString(16).padStart(8,'0'));
        this.halted=true;
    }
    if(wr&&rd!==0)this.regs[rd]=rdv;
    this.regs[0]=0;
    if(!this.halted)this.pc=npc;
    this.count++;
  }

  disasm(I,pc){
    const op=I&127,rd=(I>>7)&31,f3=(I>>12)&7,rs1=(I>>15)&31,rs2=(I>>20)&31,f7=(I>>25)&127;
    const n=RN,h=v=>'0x'+(v>>>0).toString(16).padStart(8,'0');
    const iI=this.iI(I),iS=this.iS(I),iB=this.iB(I),iJ=this.iJ(I),uU=((this.iU(I))>>>12)&0xFFFFF;
    switch(op){
      case 0x37:return['lui',`${n[rd]}, 0x${uU.toString(16)}`,'U'];
      case 0x17:return['auipc',`${n[rd]}, 0x${uU.toString(16)}`,'U'];
      case 0x6F:return['jal',`${n[rd]}, ${h(pc+iJ)}`,'J'];
      case 0x67:return['jalr',`${n[rd]}, ${n[rs1]}, ${iI}`,'J'];
      case 0x63:{const t={0:'beq',1:'bne',4:'blt',5:'bge',6:'bltu',7:'bgeu'}[f3]||'b?';return[t,`${n[rs1]}, ${n[rs2]}, ${h(pc+iB)}`,'B'];}
      case 0x03:{const t={0:'lb',1:'lh',2:'lw',4:'lbu',5:'lhu'}[f3]||'l?';return[t,`${n[rd]}, ${iI}(${n[rs1]})`,'L'];}
      case 0x23:{const t={0:'sb',1:'sh',2:'sw'}[f3]||'s?';return[t,`${n[rs2]}, ${iS}(${n[rs1]})`,'S'];}
      case 0x13:{
        if(f3===1)return['slli',`${n[rd]}, ${n[rs1]}, ${iI&31}`,'I'];
        if(f3===5)return[f7===0x20?'srai':'srli',`${n[rd]}, ${n[rs1]}, ${iI&31}`,'I'];
        const t={0:'addi',2:'slti',3:'sltiu',4:'xori',6:'ori',7:'andi'}[f3]||'i?';
        return[t,`${n[rd]}, ${n[rs1]}, ${iI}`,'I'];}
      case 0x33:{
        if(f3===0)return[f7===0x20?'sub':'add',`${n[rd]}, ${n[rs1]}, ${n[rs2]}`,'R'];
        if(f3===5)return[f7===0x20?'sra':'srl',`${n[rd]}, ${n[rs1]}, ${n[rs2]}`,'R'];
        const t={1:'sll',2:'slt',3:'sltu',4:'xor',6:'or',7:'and'}[f3]||'r?';
        return[t,`${n[rd]}, ${n[rs1]}, ${n[rs2]}`,'R'];}
      case 0x73:return['ecall','','SYS'];
      default:return['???',`op=0x${op.toString(16)}`,'?'];
    }
  }
}

// ── Demo programs ──────────────────────────────────────────
const DEMO_RISCVTEST=new Uint8Array([
  0x13,0x01,0x50,0x00,0x93,0x01,0xC0,0x00,0x93,0x83,0x71,0xFF,
  0x33,0xE2,0x23,0x00,0xB3,0xF2,0x41,0x00,0xB3,0x82,0x42,0x00,
  0x63,0x88,0x72,0x02,0x33,0xA2,0x41,0x00,0x63,0x04,0x02,0x00,
  0x93,0x02,0x00,0x00,0x33,0xA2,0x23,0x00,0xB3,0x03,0x52,0x00,
  0xB3,0x83,0x23,0x40,0x23,0xA2,0x71,0x04,0x03,0x21,0x00,0x06,
  0xB3,0x04,0x51,0x00,0xEF,0x01,0x80,0x00,0x13,0x01,0x10,0x00,
  0x33,0x01,0x91,0x00,0x23,0xA0,0x21,0x02,0x63,0x00,0x21,0x00
]);

const DEMO_QUICKSORT=new Uint8Array([
  0x37,0x01,0x00,0x01,0x13,0x06,0x60,0x00,0x23,0x20,0xC1,0x00,
  0x13,0x06,0x40,0x00,0x23,0x22,0xC1,0x00,0x13,0x06,0x30,0x00,
  0x23,0x24,0xC1,0x00,0x13,0x06,0x20,0x00,0x23,0x26,0xC1,0x00,
  0x13,0x06,0x10,0x00,0x23,0x28,0xC1,0x00,0x13,0x06,0x80,0x00,
  0x23,0x2A,0xC1,0x00,0x13,0x06,0x90,0x00,0x23,0x2C,0xC1,0x00,
  0x6F,0x00,0x00,0x00
]);

const DEMO_TREE=new Uint8Array([
  0x37,0x01,0x00,0x01,
  0x13,0x06,0x60,0x00,0x23,0x20,0xC1,0x00, // [0]=6
  0x13,0x06,0x40,0x00,0x23,0x22,0xC1,0x00, // [1]=4
  0x13,0x06,0x40,0x00,0x23,0x24,0xC1,0x00, // [2]=4
  0x13,0x06,0x10,0x00,0x23,0x26,0xC1,0x00, // [3]=1
  0x13,0x06,0x20,0x00,0x23,0x28,0xC1,0x00, // [4]=2
  0x13,0x06,0x20,0x00,0x23,0x2A,0xC1,0x00, // [5]=2
  0x13,0x06,0x10,0x00,0x23,0x2C,0xC1,0x00, // [6]=1
  // resultado a0=1 (es simétrico)
  0x13,0x05,0x10,0x00, // addi a0,x0,1
  0x6F,0x00,0x00,0x00  // jal x0,0 (halt)
]);

// ── Estado global ──────────────────────────────────────────
const cpu=new CPU();
let prev=new Int32Array(32);
let memAddr=0;
const p8=v=>'0x'+(v>>>0).toString(16).padStart(8,'0');
const ph=v=>(v>>>0).toString(16).padStart(8,'0');

// ── Tipo → color de mnemónico ──────────────────────────────
function mnColor(type){
  return{L:'kw-load',S:'kw-store',B:'kw-branch',J:'kw-jump',R:'kw-arith',I:'kw-arith',U:'kw-arith',SYS:'kw-load','?':'co-err'}[type]||'';
}

// ── Render registros ───────────────────────────────────────
function renderRegs(){
  const c=document.getElementById('regs-list');
  let h=`<div class="reg-row"><span class="rn">pc</span><span class="ra"></span><span class="rv pc-val">${p8(cpu.pc)}</span></div>`;
  for(let i=0;i<32;i++){
    const v=cpu.regs[i]>>>0,ch=v!==(prev[i]>>>0);
    h+=`<div class="reg-row${ch?' changed':''}"><span class="rn">x${i}</span><span class="ra">${RN[i]}</span><span class="rv${v?' nz':''}">${ph(v)}</span></div>`;
  }
  c.innerHTML=h;
}

// ── Render desensamblado ───────────────────────────────────
function renderDisasm(){
  const c=document.getElementById('disasm-list');
  const pc=cpu.pc>>>0,start=Math.max(0,pc-10*4);
  document.getElementById('dis-pc-lbl').textContent='PC = '+p8(pc);
  let h='';
  for(let i=0;i<36;i++){
    const a=(start+i*4)>>>0;if(a>=MEM)break;
    const I=cpu.r32(a),[mn,ops,tp]=cpu.disasm(I,a);
    const cur=a===pc;
    h+=`<div class="di-row${cur?' cur':''}">
      <span class="di-mark">${cur?'▶':''}</span>
      <span class="di-addr">${ph(a)}</span>
      <span class="di-hex">${ph(I)}</span>
      <span class="di-mn"><span class="${mnColor(tp)}">${mn}</span> <span style="color:#9cdcfe">${ops}</span></span>
    </div>`;
  }
  c.innerHTML=h;
  const el=c.querySelector('.cur');if(el)el.scrollIntoView({block:'nearest'});
}

// ── Render memoria ─────────────────────────────────────────
function renderMem(addr){
  memAddr=addr>>>0;
  document.getElementById('mem-addr').value=p8(memAddr);
  const c=document.getElementById('mem-content');
  const pcBytes=new Set([cpu.pc,cpu.pc+1,cpu.pc+2,cpu.pc+3].map(x=>x>>>0));
  let h='';
  for(let r=0;r<10;r++){
    const a=(memAddr+r*16)>>>0;if(a>=MEM)break;
    let bytes='',ascii='';
    for(let i=0;i<16;i++){
      const ba=(a+i)>>>0,cv=ba<MEM?cpu.mem[ba]:0;
      const hi=pcBytes.has(ba),nz=cv!==0&&!hi;
      bytes+=`<span${hi?' class="hi"':nz?' class="nz"':''}>${cv.toString(16).padStart(2,'0')}</span> `;
      ascii+=(cv>=32&&cv<127)?String.fromCharCode(cv):'.';
    }
    h+=`<div class="mem-row"><span class="ma">${ph(a)}:</span><span class="mb">${bytes}</span><span class="mc">${ascii}</span></div>`;
  }
  c.innerHTML=h;
}

// ── Bottom bar ─────────────────────────────────────────────
function renderStatus(){
  document.getElementById('bb-pc').textContent=p8(cpu.pc);
  document.getElementById('bb-ic').textContent=cpu.count.toLocaleString();
  document.getElementById('bb-sp').textContent=p8(cpu.regs[2]);
  document.getElementById('bb-a0').textContent=p8(cpu.regs[10]);
  document.getElementById('bb-ra').textContent=p8(cpu.regs[1]);
  const s=document.getElementById('status-txt');
  s.textContent=cpu.halted?`DETENIDO (exit ${cpu.exitCode})`:'Listo';
  s.style.color=cpu.halted?'#9d9d9d':'#4ec9b0';
}

function renderAll(){renderRegs();renderDisasm();renderMem(memAddr);renderStatus();}

// ── Consola ────────────────────────────────────────────────
const cout=document.getElementById('console-out');
function clog(msg,cls='co-dim'){
  const d=document.createElement('div');d.className='co-line '+cls;d.textContent=msg;
  cout.appendChild(d);cout.scrollTop=cout.scrollHeight;
}
function flushOut(){if(cpu.out.length){cpu.out.forEach(s=>clog(s,'co-out'));cpu.out=[];}}

function execCmd(raw){
  raw=raw.trim();if(!raw)return;
  const parts=raw.split(/\s+/),cmd=parts[0].toLowerCase();
  clog('› '+raw,'co-cmd');
  const parseA=s=>{s=(s||'').trim();return(s.startsWith('0x')||s.startsWith('0X'))?parseInt(s,16)>>>0:parseInt(s,10)>>>0;};
  switch(cmd){
    case 'step':case 's':{
      const n=parseInt(parts[1])||1;
      prev.set(cpu.regs);
      for(let i=0;i<n&&!cpu.halted;i++)cpu.step();
      flushOut();renderAll();
      clog(`PC=${p8(cpu.pc)}  instrucciones=${cpu.count}`,'co-dim');
      if(cpu.halted)clog(`Programa detenido. Código de salida: ${cpu.exitCode}`,'co-info');
      break;}
    case 'run':case 'r':{
      prev.set(cpu.regs);let n=0;
      while(!cpu.halted&&n<5000000){cpu.step();n++;}
      flushOut();renderAll();
      clog(`Ejecutadas ${n.toLocaleString()} instrucciones. Exit: ${cpu.exitCode}`,'co-info');break;}
    case 'pc':clog(`pc = ${p8(cpu.pc)}`,'co-ok');break;
    case 'regs':
      if(parts[1]){
        for(let i=1;i<parts.length;i++){const t=parts[i];
          for(let r=0;r<32;r++)if(t==='x'+r||t===RN[r])clog(`x${r} (${RN[r]}) = ${p8(cpu.regs[r])}  (${cpu.regs[r]})`,'co-ok');}
      } else {
        clog(`pc = ${p8(cpu.pc)}`,'co-ok');
        for(let i=0;i<32;i++)clog(`x${i.toString().padStart(2)} (${RN[i].padEnd(4)}) = ${ph(cpu.regs[i]>>>0)}  (${cpu.regs[i]})`,'co-ok');}
      break;
    case 'mem':{
      const a=parseA(parts[1]);const end=parts[2]?parseA(parts[2]):a+15;
      renderMem(a);
      for(let row=a;row<=end;row+=16){let ln='';
        for(let i=0;i<16&&row+i<=end;i++)ln+=cpu.mem[(row+i)>>>0].toString(16).padStart(2,'0')+' ';
        clog(`${ph(row)}: ${ln.trim()}`,'co-ok');}
      break;}
    case 'disasm':case 'd':{
      const a=parseA(parts[1])||cpu.pc,n=parseInt(parts[2])||8;
      for(let i=0;i<n;i++){const addr=(a+i*4)>>>0;const I=cpu.r32(addr);const[mn,ops]=cpu.disasm(I,addr);
        clog(`${addr===cpu.pc>>>0?'▶':' '} ${ph(addr)}  ${ph(I)}  ${mn} ${ops}`,'co-ok');}
      break;}
    case 'reset':cpu.reset();prev.fill(0);memAddr=0;renderAll();clog('Simulador reseteado.','co-info');break;
    case 'info':
      clog(`PC=${p8(cpu.pc)} | count=${cpu.count} | halted=${cpu.halted} | exit=${cpu.exitCode}`,'co-info');
      clog(`sp=${p8(cpu.regs[2])} | ra=${p8(cpu.regs[1])} | a0=${p8(cpu.regs[10])}`,'co-info');break;
    case 'help':
      ['step [N]        — ejecutar N instrucciones (default 1)',
       'run             — ejecutar hasta halt (máx 5M instrucciones)',
       'pc              — mostrar PC actual',
       'regs [x0..x31] — mostrar registros (sin args: todos)',
       'mem <addr> [end]— ver memoria en hex',
       'disasm [addr] N — desensamblar N instrucciones',
       'reset           — reiniciar simulador completo',
       'info            — estado general del simulador'
      ].forEach(l=>clog(l,'co-dim'));break;
    default:clog(`Comando desconocido: '${cmd}'. Escribe 'help'.`,'co-err');
  }
}

// ── Botones ────────────────────────────────────────────────
function doStep(n=1){
  prev.set(cpu.regs);
  for(let i=0;i<n&&!cpu.halted;i++)cpu.step();
  flushOut();renderAll();
  if(cpu.halted)clog(`Detenido. Exit: ${cpu.exitCode}`,'co-info');
}
document.getElementById('btn-step').onclick=()=>doStep(1);
document.getElementById('btn-step10').onclick=()=>doStep(10);
document.getElementById('btn-step100').onclick=()=>doStep(100);
document.getElementById('btn-run').onclick=()=>{
  prev.set(cpu.regs);let n=0;
  while(!cpu.halted&&n<5000000){cpu.step();n++;}
  flushOut();renderAll();
  clog(`Run: ${n.toLocaleString()} instrucciones. Exit: ${cpu.exitCode}`,'co-info');
};
document.getElementById('btn-reset').onclick=()=>{
  cpu.reset();prev.fill(0);memAddr=0;renderAll();clog('Reseteado.','co-info');
};
function loadDemo(bytes,name,hint){
  cpu.reset();prev.fill(0);cpu.load(bytes,0);
  document.getElementById('status-txt').textContent=name;
  clog(`${name} cargado.`,'co-info');
  if(hint)clog(hint,'co-dim');
  renderAll();
}
document.getElementById('btn-demo').onclick=()=>loadDemo(DEMO_RISCVTEST,'riscvtest','Resultado esperado: mem 0x64 → 19 00 00 00 (valor 25)');
document.getElementById('btn-demo-qs').onclick=()=>{
  cpu.reset();prev.fill(0);cpu.load(DEMO_QUICKSORT,0);
  [6,4,3,2,1,8,9].forEach((v,i)=>cpu.w32(0x1000+i*4,v));
  document.getElementById('status-txt').textContent='quicksort';
  clog('Quicksort cargado. Array {6,4,3,2,1,8,9} en 0x1000.','co-info');
  clog('Usa "mem 0x1000" para ver el array.','co-dim');
  renderMem(0x1000);renderAll();
};
document.getElementById('btn-demo-tree').onclick=()=>{
  loadDemo(DEMO_TREE,'árbol simétrico','Array {6,4,4,1,2,2,1} en 0x1000. Resultado: a0=1 (simétrico)');
  [6,4,4,1,2,2,1].forEach((v,i)=>cpu.w32(0x1000+i*4,v));
  renderMem(0x1000);renderAll();
};
document.getElementById('file-input').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    cpu.reset();prev.fill(0);
    cpu.load(new Uint8Array(ev.target.result),0);
    document.getElementById('status-txt').textContent=f.name;
    clog(`"${f.name}" cargado (${f.size} bytes).`,'co-info');
    renderAll();
  };
  r.readAsArrayBuffer(f);
};
document.getElementById('btn-mem-go').onclick=()=>{
  const v=document.getElementById('mem-addr').value;
  const a=(v.startsWith('0x')||v.startsWith('0X'))?parseInt(v,16)>>>0:parseInt(v,10)>>>0;
  renderMem(a);
};
document.getElementById('btn-mem-pc').onclick=()=>renderMem(cpu.pc);
document.getElementById('btn-mem-64').onclick=()=>renderMem(0x64);
document.getElementById('btn-mem-1000').onclick=()=>renderMem(0x1000);
document.getElementById('mem-addr').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-mem-go').click();});
document.getElementById('console-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const i=e.target;execCmd(i.value);i.value='';}
});
document.addEventListener('keydown',e=>{
  if(document.activeElement.id==='console-input'||document.activeElement.id==='mem-addr')return;
  if(e.key==='F7'){e.preventDefault();doStep(1);}
  else if(e.key==='F8'){e.preventDefault();document.getElementById('btn-run').click();}
  else if(e.key==='F9'){e.preventDefault();document.getElementById('btn-reset').click();}
});

// ── Init ───────────────────────────────────────────────────
clog('RISC-V RV32I Simulator — CS3051 Arquitectura de Computadores 2025-II','co-info');
clog('Carga un .bin desde CPUlator o usa uno de los demos.','co-dim');
clog('Escribe "help" para ver todos los comandos disponibles.','co-dim');
clog('────────────────────────────────────────────────────','co-dim');
renderAll();
</script>
</body>
